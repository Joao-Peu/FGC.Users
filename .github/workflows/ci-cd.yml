name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FGC.Users.sln

      - name: Build
        run: dotnet build FGC.Users.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FGC.Users.sln --configuration Release --no-build --verbosity normal

  cd:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/fgc-users
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f src/FGC.Users.API/Dockerfile .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Azure Container App
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/fgc-users:${{ github.sha }}
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image $IMAGE
          az containerapp ingress traffic set \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --revision-weight latest=100
